<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Management</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .stat-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
      flex: 1;
    }
    .stat-label {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
      margin-bottom: 8px;
    }
    .stat-value {
      font-size: 32px;
      font-weight: 600;
      color: var(--text-dark);
    }
  </style>
</head>
<body style="background: #f8fafc; padding: 40px;">

  <div style="max-width: 1200px; margin: 0 auto;">
    
    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
      <div>
        <h1 style="font-size: 24px; font-weight: 600; margin-bottom: 4px;">User Management</h1>
        <p style="color: var(--text-muted); font-size: 14px;">Manage team members, roles, and product analysis permissions.</p>
      </div>
      <button class="btn btn-primary" style="background: #6c2bd9;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14m-7-7h14"></path></svg>
        Add User
      </button>
    </div>

    <!-- Stats -->
    <div class="flex gap-6 mb-8">
      <div class="stat-card">
        <div class="stat-label">Total Users</div>
        <div class="stat-value">24</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Active Analysts</div>
        <div class="stat-value" style="color: #6c2bd9;">12</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pending Invites</div>
        <div class="stat-value">3</div>
      </div>
    </div>

    <!-- Table Card -->
    <div class="card" style="border-radius: 12px;">
      <div class="table-container">
        <table>
          <thead style="background: #f1f5f9;">
            <tr>
              <th style="width: 30%;">Name</th>
              <th style="width: 35%;">Email</th>
              <th style="width: 20%;">Permissions</th>
              <th style="width: 15%;"></th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>
                <div class="flex items-center gap-3">
                  <div class="avatar" style="width: 36px; height: 36px;">
                    <img src="https://api.dicebear.com/7.x/adventurer-neutral/svg?seed=Jane&backgroundColor=cbd5e1" alt="Jane">
                  </div>
                  <span style="font-size: 14px; font-weight: 500; color: var(--text-dark);">Jane Doe</span>
                </div>
              </td>
              <td style="color: #64748b;">jane.doe@example.com</td>
              <td>
                <div class="select-wrapper">
                  <select style="width: 100%;">
                    <option selected>Admin</option>
                    <option>Analyst</option>
                    <option>Informed Member</option>
                  </select>
                </div>
              </td>
              <td style="text-align: right;">
                <button class="btn" style="color: #dc2626; font-size: 13px; font-weight: 600; padding: 6px 12px;">Remove</button>
              </td>
            </tr>
            <tr>
              <td>
                <div class="flex items-center gap-3">
                  <div class="avatar" style="width: 36px; height: 36px;">
                    <img src="https://api.dicebear.com/7.x/adventurer-neutral/svg?seed=Mark&backgroundColor=e2e8f0" alt="Mark">
                  </div>
                  <span style="font-size: 14px; font-weight: 500; color: var(--text-dark);">Mark Smith</span>
                </div>
              </td>
              <td style="color: #64748b;">m.smith@product-tool.io</td>
              <td>
                <div class="select-wrapper">
                  <select style="width: 100%;">
                    <option>Admin</option>
                    <option selected>Analyst</option>
                    <option>Informed Member</option>
                  </select>
                </div>
              </td>
              <td style="text-align: right;">
                <button class="btn" style="color: #dc2626; font-size: 13px; font-weight: 600; padding: 6px 12px;">Remove</button>
              </td>
            </tr>
            <tr>
              <td>
                <div class="flex items-center gap-3">
                  <div class="avatar" style="width: 36px; height: 36px;">
                    <img src="https://api.dicebear.com/7.x/adventurer-neutral/svg?seed=Alice&backgroundColor=f1f5f9" alt="Alice">
                  </div>
                  <span style="font-size: 14px; font-weight: 500; color: var(--text-dark);">Alice Lundberg</span>
                </div>
              </td>
              <td style="color: #64748b;">alice.l@example.com</td>
              <td>
                <div class="select-wrapper">
                  <select style="width: 100%;">
                    <option>Admin</option>
                    <option>Analyst</option>
                    <option selected>Informed Member</option>
                  </select>
                </div>
              </td>
              <td style="text-align: right;">
                <button class="btn" style="color: #dc2626; font-size: 13px; font-weight: 600; padding: 6px 12px;">Remove</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div class="flex items-center justify-between" style="padding: 16px 24px; border-top: 1px solid var(--border);">
        <p style="font-size: 13px; color: #64748b;">Showing 1 to 3 of 24 users</p>
        <div class="flex gap-2">
          <button class="btn btn-outline" style="padding: 6px 12px; font-size: 13px;">Previous</button>
          <button class="btn btn-outline" style="padding: 6px 12px; font-size: 13px;">Next</button>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
